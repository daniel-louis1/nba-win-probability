<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NBA Win Probability</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0c0c;
      --card: #141414;
      --border: #2a2a2a;
      --muted: #888;
      --text: #fff;
      --home: #5b9cf6;
      --away: #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── NAV ── */
    nav {
      width: 100%;
      border-bottom: 1px solid var(--border);
      padding: 13px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
    }

    .nav-left { display: flex; align-items: center; gap: 10px; }

    /* logo links to home, hover underline */
    .logo {
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.3px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .logo:hover { opacity: 0.7; }

    .nav-sep { color: var(--border); font-size: 18px; font-weight: 200; }

    .nav-section { font-size: 12px; font-weight: 500; color: var(--muted); }

    .nav-right { display: flex; align-items: center; gap: 12px; }

    /* last updated — in the nav */
    .last-updated {
      font-size: 11px;
      font-weight: 500;
      color: #555;
      letter-spacing: 0.3px;
    }

    .demo-chip {
      display: none;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #f59e0b;
      border: 1px solid rgba(245,158,11,0.2);
      padding: 3px 10px;
      border-radius: 100px;
      background: rgba(245,158,11,0.06);
      cursor: default;
      position: relative;
    }
    .demo-chip.on { display: flex; align-items: center; gap: 6px; }

    /* tooltip on demo chip */
    .demo-chip::after {
      content: 'No live game — simulating a realistic game state';
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #1e1e1e;
      border: 1px solid var(--border);
      color: #aaa;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0;
      white-space: nowrap;
      padding: 7px 12px;
      border-radius: 8px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .demo-chip:hover::after { opacity: 1; }

    /* ── LAYOUT ── */
    .container {
      width: 100%;
      max-width: 820px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── BREADCRUMB — plain text, not links ── */
    .breadcrumb {
      font-size: 11px;
      font-weight: 500;
      color: #555;
      letter-spacing: 0.3px;
      padding-bottom: 4px;
      user-select: none;
    }
    .breadcrumb .sep { color: #333; margin: 0 6px; }
    .breadcrumb .crumb-current { color: #888; }

    /* ── GAME CARD ── */
    .game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .game-card:hover { border-color: #3a3a3a; }

    .game-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .team-side { display: flex; align-items: center; gap: 12px; }
    .team-side.right { flex-direction: row-reverse; }

    .team-badge {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .team-badge.home { background: rgba(91,156,246,0.12); color: var(--home); }
    .team-badge.away { background: rgba(248,113,113,0.12); color: var(--away); }

    .team-name-col { display: flex; flex-direction: column; gap: 2px; }
    .team-name-col.right { align-items: flex-end; }

    .team-tri { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }

    .team-loc {
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .score-center { display: flex; flex-direction: column; align-items: center; gap: 6px; }

    .scores-row { display: flex; align-items: center; gap: 12px; }

    /* skeleton shimmer for loading state */
    .skeleton {
      background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .score-num {
      font-size: 44px;
      font-weight: 200;
      color: #fff;
      line-height: 1;
      min-width: 52px;
      text-align: center;
      transition: opacity 0.3s;
    }
    .score-num.loading { opacity: 0; }

    .score-skeleton {
      display: none;
      width: 52px;
      height: 44px;
    }
    .score-skeleton.show { display: block; }

    .score-dash { color: #2a2a2a; font-size: 24px; font-weight: 300; }

    .game-status { display: flex; align-items: center; gap: 8px; }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      color: var(--home);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .live-indicator.demo-c { color: #f59e0b; }

    .live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--home);
      animation: blink 1.8s ease-in-out infinite;
    }
    .live-dot.demo-c { background: #f59e0b; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    .clock-period { font-size: 12px; font-weight: 500; color: var(--muted); }

    /* ── LAST PLAY BAR ── */
    .last-play {
      padding: 10px 24px;
      font-size: 12px;
      font-weight: 500;
      color: #aaa;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .last-play-label { font-weight: 700; color: #666; margin-right: 6px; }

    /* ── CHART ── */
    .chart-section { padding: 16px 24px 20px; position: relative; }

    .chart-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .chart-label {
      font-size: 10px;
      font-weight: 600;
      color: #777;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .chart-legend { display: flex; gap: 14px; }

    .leg {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      color: #777;
    }
    .leg-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* zero-state overlay on chart */
    .chart-zero {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      color: #444;
      letter-spacing: 0.5px;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    .chart-zero.hidden { opacity: 0; }

    /* ── PROB CARD ── */
    .prob-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      transition: border-color 0.2s;
    }
    .prob-card:hover { border-color: #3a3a3a; }

    .prob-title {
      font-size: 10px;
      font-weight: 600;
      color: #777;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .prob-teams {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 14px;
    }

    .prob-block { display: flex; flex-direction: column; gap: 4px; }
    .prob-block.right { align-items: flex-end; }

    .prob-team-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .prob-big {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -2.5px;
      line-height: 1;
      transition: opacity 0.15s;
    }

    /* flash animation when probability updates */
    @keyframes probFlash { 0% { opacity: 1; } 30% { opacity: 0.4; } 100% { opacity: 1; } }
    .prob-big.flash { animation: probFlash 0.4s ease; }

    .prob-big.home {
      background: linear-gradient(135deg, #5b9cf6, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .prob-big.away {
      background: linear-gradient(135deg, #f87171, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .prob-mid {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding-bottom: 6px;
    }

    /* probability bar with 50% center tick */
    .prob-bar-wrap { position: relative; }

    .prob-bar {
      width: 100%;
      height: 6px;
      background: #1c1c1c;
      border-radius: 3px;
      position: relative;
      overflow: hidden;
    }

    .prob-fill-l {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 50%;
      background: linear-gradient(90deg, #3b82f6, #818cf8);
      border-radius: 3px;
      transition: width 1.4s cubic-bezier(0.4,0,0.2,1);
    }

    .prob-fill-r {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 50%;
      background: linear-gradient(270deg, #ef4444, #f97316);
      border-radius: 3px;
      transition: width 1.4s cubic-bezier(0.4,0,0.2,1);
    }

    /* 50% center marker */
    .prob-center-tick {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: -3px;
      width: 2px;
      height: 12px;
      background: #0c0c0c;
      border-radius: 1px;
      z-index: 2;
      pointer-events: none;
    }

    /* ── FOOTER ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding-top: 6px;
      font-size: 11px;
      font-weight: 500;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .f-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--home);
      animation: blink 1.8s infinite;
    }
    .f-dot.demo { background: #f59e0b; }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="/" class="logo">WinProb</a>
    <div class="nav-sep">/</div>
    <div class="nav-section">NBA · Live Win Probability</div>
  </div>
  <div class="nav-right">
    <div class="last-updated" id="last-updated"></div>
    <div class="demo-chip" id="demo-chip">
      <span>Demo</span>
    </div>
  </div>
</nav>

<div class="container">

  <!-- plain text breadcrumb, not clickable links -->
  <div class="breadcrumb">
    Sports <span class="sep">›</span>
    Basketball <span class="sep">›</span>
    NBA <span class="sep">›</span>
    <span class="crumb-current" id="matchup-crumb">Loading...</span>
  </div>

  <!-- GAME CARD -->
  <div class="game-card">

    <div class="game-header">
      <div class="team-side">
        <div class="team-badge home" id="home-badge">BOS</div>
        <div class="team-name-col">
          <div class="team-tri" id="home-tri">BOS</div>
          <div class="team-loc">Home</div>
        </div>
      </div>

      <div class="score-center">
        <div class="scores-row">
          <div class="score-num" id="home-score">—</div>
          <div class="score-dash">—</div>
          <div class="score-num" id="away-score">—</div>
        </div>
        <div class="game-status">
          <div class="live-indicator" id="live-ind">
            <div class="live-dot" id="live-dot"></div>
            <span id="live-label">Live</span>
          </div>
          <div class="clock-period" id="clock-period">—</div>
        </div>
      </div>

      <div class="team-side right">
        <div class="team-badge away" id="away-badge">LAL</div>
        <div class="team-name-col right">
          <div class="team-tri" id="away-tri">LAL</div>
          <div class="team-loc">Away</div>
        </div>
      </div>
    </div>

    <div class="last-play">
      <span class="last-play-label">Lead</span>
      <span id="lead-text">Loading...</span>
    </div>

    <div class="chart-section">
      <div class="chart-meta">
        <div class="chart-label">Win probability over time</div>
        <div class="chart-legend">
          <div class="leg"><div class="leg-dot" style="background:#5b9cf6"></div><span id="leg-h">BOS</span></div>
          <div class="leg"><div class="leg-dot" style="background:#f87171"></div><span id="leg-a">LAL</span></div>
        </div>
      </div>
      <div style="position:relative">
        <canvas id="chart" height="80"></canvas>
        <canvas id="crosshair-canvas" height="80" style="position:absolute;top:0;left:0;width:100%;pointer-events:none;"></canvas>
        <div class="chart-zero" id="chart-zero">Accumulating data...</div>
      </div>
    </div>

  </div>

  <!-- PROB CARD -->
  <div class="prob-card">
    <div class="prob-title">Chance to win</div>
    <div class="prob-teams">
      <div class="prob-block">
        <div class="prob-team-name" id="h-label">BOS</div>
        <div class="prob-big home" id="prob-h">—</div>
      </div>
      <div class="prob-mid" id="lead-badge">—</div>
      <div class="prob-block right">
        <div class="prob-team-name" id="a-label">LAL</div>
        <div class="prob-big away" id="prob-a">—</div>
      </div>
    </div>
    <div class="prob-bar-wrap">
      <div class="prob-bar">
        <div class="prob-fill-l" id="fill-l"></div>
        <div class="prob-fill-r" id="fill-r"></div>
      </div>
      <div class="prob-center-tick"></div>
    </div>
  </div>

  <div class="footer">
    <div class="f-dot" id="f-dot"></div>
    <span id="status">Connecting...</span>
  </div>

</div>

<script>
  // overlay canvas crosshair — never redraws the main chart
  const overlayCanvas = document.getElementById('crosshair-canvas');
  const overlayCtx = overlayCanvas.getContext('2d');
  let rafId = null;

  function drawCrosshair(x) {
    const w = overlayCanvas.offsetWidth;
    const h = overlayCanvas.offsetHeight;
    overlayCanvas.width = w;
    overlayCanvas.height = h;
    overlayCtx.clearRect(0, 0, w, h);
    if (x == null) return;
    overlayCtx.save();
    overlayCtx.strokeStyle = 'rgba(255,255,255,0.15)';
    overlayCtx.lineWidth = 1;
    overlayCtx.setLineDash([4, 4]);
    overlayCtx.beginPath();
    overlayCtx.moveTo(x, 0);
    overlayCtx.lineTo(x, h);
    overlayCtx.stroke();
    overlayCtx.restore();
  }

  document.getElementById('chart').addEventListener('mousemove', (e) => {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(() => {
      const rect = e.target.getBoundingClientRect();
      drawCrosshair(e.clientX - rect.left);
    });
  });

  document.getElementById('chart').addEventListener('mouseleave', () => {
    if (rafId) cancelAnimationFrame(rafId);
    drawCrosshair(null);
  });

  const ctx = document.getElementById('chart').getContext('2d');
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        { data: [], borderColor: '#5b9cf6', backgroundColor: 'rgba(91,156,246,0.05)', borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 5, pointHoverBackgroundColor: '#5b9cf6', fill: true, tension: 0.4 },
        { data: [], borderColor: '#f87171', backgroundColor: 'rgba(248,113,113,0.03)', borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 5, pointHoverBackgroundColor: '#f87171', fill: true, tension: 0.4 }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: true,
          backgroundColor: '#1e1e1e',
          borderColor: '#2a2a2a',
          borderWidth: 1,
          padding: 10,
          titleColor: '#666',
          titleFont: { size: 10, family: 'Inter', weight: '600' },
          bodyFont: { size: 12, family: 'Inter', weight: '600' },
          callbacks: {
            title: () => '',
            label: (item) => {
              const teamEl = item.datasetIndex === 0
                ? document.getElementById('leg-h')
                : document.getElementById('leg-a');
              const team = teamEl ? teamEl.textContent : (item.datasetIndex === 0 ? 'Home' : 'Away');
              return `  ${team}  ${Math.round(item.raw * 100)}%`;
            },
            labelColor: (item) => ({
              borderColor: 'transparent',
              backgroundColor: item.datasetIndex === 0 ? '#5b9cf6' : '#f87171',
              borderRadius: 2
            })
          }
        }
      },
      scales: {
        x: { display: false },
        y: {
          suggestedMin: 0.2,
          suggestedMax: 0.8,
          grid: { color: 'rgba(255,255,255,0.05)' },
          border: { color: 'transparent' },
          ticks: { color: '#888', font: { size: 10, family: 'Inter' }, callback: v => Math.round(v*100)+'%' }
        }
      },
      animation: { duration: 300 }
    }
  });

  let dataPoints = 0;
  let pollMs = 5000, timerId;
  let lastUpdateTime = null;
  let updateTimerInterval;

  // "last updated X seconds ago" counter
  function startUpdateCounter() {
    lastUpdateTime = Date.now();
    clearInterval(updateTimerInterval);
    updateTimerInterval = setInterval(() => {
      if (!lastUpdateTime) return;
      const secs = Math.floor((Date.now() - lastUpdateTime) / 1000);
      const el = document.getElementById('last-updated');
      if (secs < 5) el.textContent = 'Updated just now';
      else el.textContent = `Updated ${secs}s ago`;
    }, 1000);
  }

  function fmt(clock) {
    if (!clock) return '—';
    const m = clock.match(/PT(\d+)M(\d+)/);
    return m ? `${parseInt(m[1])}:${m[2].padStart(2,'0')}` : clock;
  }

  function setPoll(demo) {
    const r = demo ? 5000 : 30000;
    if (r !== pollMs) { pollMs = r; clearInterval(timerId); timerId = setInterval(tick, pollMs); }
  }

  // flash the probability numbers on update
  function flashProb(id) {
    const el = document.getElementById(id);
    el.classList.remove('flash');
    void el.offsetWidth; // reflow to restart animation
    el.classList.add('flash');
  }

  function update(prob, gs, demo) {
    const hp = Math.round(prob * 100), ap = 100 - hp;

    document.getElementById('fill-l').style.width = hp + '%';
    document.getElementById('fill-r').style.width = ap + '%';
    document.getElementById('prob-h').textContent = hp + '%';
    document.getElementById('prob-a').textContent = ap + '%';
    flashProb('prob-h');
    flashProb('prob-a');

    startUpdateCounter();
    setPoll(demo);

    const chip = document.getElementById('demo-chip');
    const dot = document.getElementById('live-dot');
    const lind = document.getElementById('live-ind');
    const fdot = document.getElementById('f-dot');

    if (demo) {
      chip.classList.add('on');
      dot.classList.add('demo-c');
      lind.classList.add('demo-c');
      fdot.classList.add('demo');
      document.getElementById('live-label').textContent = 'Demo';
      document.getElementById('status').textContent = 'Demo mode — no live game';
    } else {
      chip.classList.remove('on');
      dot.classList.remove('demo-c');
      lind.classList.remove('demo-c');
      fdot.classList.remove('demo');
      document.getElementById('live-label').textContent = 'Live';
      document.getElementById('status').textContent = 'Live · updating every 30s';
    }

    if (gs) {
      const h = gs.home_team ?? 'HOM', a = gs.away_team ?? 'AWY';
      const hs = gs.home_score ?? 0, as_ = gs.away_score ?? 0;
      const diff = hs - as_;

      ['home-badge','home-tri','h-label','leg-h'].forEach(id => document.getElementById(id).textContent = h);
      ['away-badge','away-tri','a-label','leg-a'].forEach(id => document.getElementById(id).textContent = a);
      document.getElementById('home-score').textContent = hs;
      document.getElementById('away-score').textContent = as_;
      document.getElementById('clock-period').textContent = `${gs.period ?? '—'} · ${fmt(gs.clock)}`;
      document.getElementById('matchup-crumb').textContent = `${h} vs ${a}`;

      const lead = diff > 0 ? `${h} +${diff}` : diff < 0 ? `${a} +${Math.abs(diff)}` : 'Tied';
      document.getElementById('lead-text').textContent = lead;
      document.getElementById('lead-badge').textContent = lead;
    }

    // chart zero-state: hide "Accumulating data..." after 3 data points
    dataPoints++;
    if (dataPoints >= 3) {
      document.getElementById('chart-zero').classList.add('hidden');
    }

    chart.data.labels.push('');
    chart.data.datasets[0].data.push(prob);
    chart.data.datasets[1].data.push(1 - prob);
    if (chart.data.labels.length > 150) {
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
      chart.data.datasets[1].data.shift();
    }
    chart.update();
  }

  async function tick() {
    try {
      const r = await fetch('/live');
      const d = await r.json();
      if (d.probability !== undefined) update(d.probability, d.game_state, d.demo === true);
    } catch {
      document.getElementById('status').textContent = 'Connection error';
    }
  }

  tick();
  timerId = setInterval(tick, pollMs);
</script>

</body>
</html>
